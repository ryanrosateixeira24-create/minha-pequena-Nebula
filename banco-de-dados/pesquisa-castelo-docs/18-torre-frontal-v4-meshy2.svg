<?xml version="1.0" encoding="UTF-8"?>
<!--
  TORRE do Check-In Station — v4
  Baseado em Crimson Lantern Pagoda (Meshy v2)
  Escala: 1 bloco = 20px | altura 34 | base 15 | eixo 7
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900" width="700" height="900">
  <defs>
    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#00000012" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4dcf0"/>
      <stop offset="1" stop-color="#e8e0ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff4a6"/>
      <stop offset="0.7" stop-color="#f4b942" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#f4b942" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="700" height="900" fill="url(#bg)"/>
  <rect width="700" height="900" fill="url(#grid)"/>

  <text x="350" y="25" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2a1f5c">TORRE v4 — Crimson Lantern Pagoda (Meshy v2)</text>
  <text x="350" y="42" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a4a8a">altura 34 • base 15 • eixo 7 • 4 andares eixo</text>

  <g transform="translate(350, 800)">
    <!-- chão de grama -->
    <rect x="-200" y="0" width="400" height="40" fill="#7aba5a" stroke="#4a8a3a" stroke-width="0.5"/>

    <!-- === PLINTH Y=0 (1 bloco 15 larg branco) === -->
    <rect x="-150" y="-20" width="300" height="20" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- moldura vermelha borda inferior do plinth -->
    <rect x="-150" y="-2" width="300" height="4" fill="#c4433c"/>

    <!-- === BASE OCTOGONAL Y=1-4 (4 blocos altura, 13 larg com pilares R nas extremidades) === -->
    <!-- linhas brancas -->
    <rect x="-130" y="-100" width="260" height="80" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>

    <!-- pilares vermelhos das quinas externas -->
    <rect x="-130" y="-100" width="20" height="80" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>
    <rect x="110" y="-100" width="20" height="80" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>

    <!-- 4 pilares vermelhos INTERNOS (peristilo) — visíveis entre os arcos -->
    <rect x="-90" y="-80" width="10" height="60" fill="#c4433c"/>
    <rect x="-60" y="-80" width="10" height="60" fill="#c4433c"/>
    <rect x="50" y="-80" width="10" height="60" fill="#c4433c"/>
    <rect x="80" y="-80" width="10" height="60" fill="#c4433c"/>

    <!-- PORTA CENTRAL EM ARCO (3 larg × 3 alt + arco) -->
    <g id="porta">
      <!-- vão escuro -->
      <rect x="-30" y="-60" width="60" height="40" fill="#3d2818"/>
      <!-- moldura vermelha grossa nas laterais -->
      <rect x="-50" y="-60" width="20" height="40" fill="#c4433c"/>
      <rect x="30" y="-60" width="20" height="40" fill="#c4433c"/>
      <!-- topo horizontal 3 blocos -->
      <rect x="-30" y="-80" width="60" height="20" fill="#c4433c"/>
      <!-- ponta triangular do arco -->
      <polygon points="-30,-80 30,-80 20,-100 -20,-100" fill="#c4433c"/>
      <polygon points="-20,-100 20,-100 10,-110 -10,-110" fill="#c4433c"/>
      <!-- lanterna brilhante dentro -->
      <ellipse cx="0" cy="-40" rx="15" ry="20" fill="url(#glow)"/>
      <rect x="-8" y="-45" width="16" height="20" fill="#fff4a6" opacity="0.9"/>
      <rect x="-4" y="-30" width="8" height="8" fill="#c4433c"/>
    </g>

    <text x="-165" y="-60" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5a4a8a">base 13×4</text>
    <text x="-165" y="-48" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5a4a8a">peristilo visível</text>

    <!-- === BEIRAL PROJETADO Y=5 (1 bloco, 15 larg = maior que base) === -->
    <rect x="-150" y="-120" width="300" height="20" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- moldura fina vermelha embaixo do beiral -->
    <rect x="-150" y="-104" width="300" height="4" fill="#c4433c"/>

    <!-- === TELHADO-SAIA Y=6-8 (3 blocos, 15→13→11→9) === -->
    <rect x="-150" y="-140" width="300" height="20" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <!-- pontas brancas nas quinas -->
    <rect x="-150" y="-140" width="20" height="20" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>
    <rect x="130" y="-140" width="20" height="20" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>

    <rect x="-130" y="-160" width="260" height="20" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-130" y="-160" width="20" height="20" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>
    <rect x="110" y="-160" width="20" height="20" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>

    <rect x="-110" y="-180" width="220" height="20" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-110" y="-180" width="20" height="20" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>
    <rect x="90" y="-180" width="20" height="20" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>

    <text x="170" y="-160" font-family="sans-serif" font-size="9" fill="#5a4a8a">saia 3 degraus 15→11</text>

    <!-- === COLAR BRANCO Y=9-10 (2 blocos, 9 larg = transição pro eixo) === -->
    <rect x="-90" y="-220" width="180" height="40" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>

    <!-- === EIXO OCTOGONAL Y=11-22 (7 blocos frontais, 4 andares muito curtos) === -->
    <!-- cada andar do eixo = 2 blocos altura (parede + anel R) + 1 andar tem medalhão -->

    <!-- Andar 1: Y=11-13 (3 blocos alt: 2 parede + 1 anel R) -->
    <rect x="-70" y="-280" width="140" height="60" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- medalhão -->
    <g transform="translate(0, -250)">
      <rect x="-20" y="-20" width="40" height="40" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
      <rect x="-10" y="-10" width="20" height="20" fill="#f4b942"/>
    </g>
    <!-- anel R final -->
    <rect x="-70" y="-300" width="140" height="20" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>

    <!-- Andar 2: Y=14-16 -->
    <rect x="-70" y="-360" width="140" height="60" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <g transform="translate(0, -330)">
      <rect x="-20" y="-20" width="40" height="40" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
      <rect x="-10" y="-10" width="20" height="20" fill="#f4b942"/>
    </g>
    <rect x="-70" y="-380" width="140" height="20" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>

    <!-- Andar 3: Y=17-19 -->
    <rect x="-70" y="-440" width="140" height="60" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <g transform="translate(0, -410)">
      <rect x="-20" y="-20" width="40" height="40" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
      <rect x="-10" y="-10" width="20" height="20" fill="#f4b942"/>
    </g>
    <rect x="-70" y="-460" width="140" height="20" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>

    <!-- Andar 4: Y=20-22 -->
    <rect x="-70" y="-520" width="140" height="60" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <g transform="translate(0, -490)">
      <rect x="-20" y="-20" width="40" height="40" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
      <rect x="-10" y="-10" width="20" height="20" fill="#f4b942"/>
    </g>
    <rect x="-70" y="-540" width="140" height="20" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>

    <text x="170" y="-380" font-family="sans-serif" font-size="9" fill="#5a4a8a">eixo 7×12, 4 andares</text>
    <text x="170" y="-368" font-family="sans-serif" font-size="9" fill="#5a4a8a">2 parede + 1 anel R</text>

    <!-- === BEIRAL SUPERIOR Y=23-24 (2 blocos, 9 larg) === -->
    <rect x="-90" y="-580" width="180" height="40" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- pontas brancas -->
    <rect x="-90" y="-580" width="20" height="20" fill="#fcfcfc" stroke="#888" stroke-width="0.5"/>
    <rect x="70" y="-580" width="20" height="20" fill="#fcfcfc" stroke="#888" stroke-width="0.5"/>

    <!-- === TELHADO CÔNICO Y=25-29 (5 blocos, 9→7→5→3→1) === -->
    <rect x="-90" y="-600" width="180" height="20" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-70" y="-620" width="140" height="20" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-50" y="-640" width="100" height="20" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-30" y="-660" width="60" height="20" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-10" y="-680" width="20" height="20" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>

    <text x="170" y="-620" font-family="sans-serif" font-size="9" fill="#5a4a8a">cônico 5 camadas 9→1</text>

    <!-- === PINÁCULO Y=30-33 (4 blocos) === -->
    <!-- Y=30: base branca 3 larg -->
    <rect x="-30" y="-700" width="60" height="20" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- Y=31: base 1 larg com detalhe R -->
    <rect x="-10" y="-720" width="20" height="20" fill="#c4433c"/>
    <!-- Y=32: bloco branco -->
    <rect x="-10" y="-740" width="20" height="20" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- Y=33+: antena vertical -->
    <line x1="0" y1="-760" x2="0" y2="-790" stroke="#c4c4c4" stroke-width="2"/>

    <text x="170" y="-730" font-family="sans-serif" font-size="9" fill="#5a4a8a">pináculo: base + esferinha R + antena</text>

    <!-- Escalas Y -->
    <g font-family="sans-serif" font-size="8" fill="#666">
      <line x1="-180" y1="0" x2="-180" y2="-780" stroke="#888" stroke-width="0.4"/>
      <line x1="-183" y1="0" x2="-177" y2="0" stroke="#888"/>
      <text x="-186" y="4" text-anchor="end">Y=0</text>
      <line x1="-183" y1="-100" x2="-177" y2="-100" stroke="#888"/>
      <text x="-186" y="-96" text-anchor="end">Y=5</text>
      <line x1="-183" y1="-200" x2="-177" y2="-200" stroke="#888"/>
      <text x="-186" y="-196" text-anchor="end">Y=10</text>
      <line x1="-183" y1="-300" x2="-177" y2="-300" stroke="#888"/>
      <text x="-186" y="-296" text-anchor="end">Y=15</text>
      <line x1="-183" y1="-400" x2="-177" y2="-400" stroke="#888"/>
      <text x="-186" y="-396" text-anchor="end">Y=20</text>
      <line x1="-183" y1="-500" x2="-177" y2="-500" stroke="#888"/>
      <text x="-186" y="-496" text-anchor="end">Y=25</text>
      <line x1="-183" y1="-600" x2="-177" y2="-600" stroke="#888"/>
      <text x="-186" y="-596" text-anchor="end">Y=30</text>
    </g>
  </g>

  <!-- Legenda -->
  <g transform="translate(20, 800)">
    <rect x="0" y="0" width="260" height="90" fill="#ffffff" opacity="0.92" stroke="#5a4a8a" stroke-width="1" rx="6"/>
    <text x="10" y="18" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a1f5c">SEÇÕES</text>
    <text x="10" y="32" font-family="sans-serif" font-size="9" fill="#2a1f5c">plinth (1) | base 13×4 c/ peristilo</text>
    <text x="10" y="44" font-family="sans-serif" font-size="9" fill="#2a1f5c">beiral (1) | saia 3 degraus | colar (2)</text>
    <text x="10" y="56" font-family="sans-serif" font-size="9" fill="#2a1f5c">eixo 7×12: 4 andares (2 parede + 1 anel)</text>
    <text x="10" y="68" font-family="sans-serif" font-size="9" fill="#2a1f5c">beiral topo | cônico 5 camadas | pináculo</text>
    <text x="10" y="82" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2a1f5c">ALTURA TOTAL: 34 blocos</text>
  </g>

  <g transform="translate(430, 800)">
    <rect x="0" y="0" width="250" height="90" fill="#ffffff" opacity="0.92" stroke="#5a4a8a" stroke-width="1" rx="6"/>
    <text x="10" y="18" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a1f5c">MUDANÇAS vs v3</text>
    <text x="10" y="32" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ altura 60→34 (versão compacta)</text>
    <text x="10" y="44" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ eixo 9→7 blocos frontais</text>
    <text x="10" y="56" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ andares eixo = 3 blocos altura</text>
    <text x="10" y="68" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ pináculo simples (não antena longa)</text>
    <text x="10" y="82" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ base tem grama embaixo (chão)</text>
  </g>
</svg>
