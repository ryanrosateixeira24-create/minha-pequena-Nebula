<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100">
  <defs>
    <pattern id="grid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none" stroke="#00000010" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4dcf0"/>
      <stop offset="1" stop-color="#e8e0ff"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1100" fill="url(#bg)"/>
  <rect width="900" height="1100" fill="url(#grid)"/>

  <text x="450" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#2a1f5c">TORRE — reconstrução detalhada (1 quadrado = 1 bloco de 16px)</text>
  <text x="450" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a4a8a">base octogonal 15 blocos • eixo octogonal 7 blocos • altura total ~44 blocos</text>

  <!-- CADA BLOCO = 16px. Origem no centro X=450, chão Y=1000 -->
  <g transform="translate(450, 1000)">
    <!-- linha do chão -->
    <line x1="-280" y1="0" x2="280" y2="0" stroke="#8b5a2b" stroke-width="1"/>
    <line x1="-280" y1="-16" x2="280" y2="-16" stroke="#c4c02a" stroke-width="8" opacity="0.4"/>

    <!-- === PLINTH (soco extra 1 bloco mais largo, 1 alto, Y=-1) === -->
    <rect x="-136" y="-16" width="272" height="16" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- borda inferior do plinth em vermelho (moldura) -->
    <rect x="-136" y="0" width="272" height="4" fill="#c4433c"/>

    <!-- === BASE OCTOGONAL === Y=0 a Y=6 (7 blocos altura, 15 blocos largura na face frontal) -->
    <!-- corpo branco -->
    <rect x="-120" y="-128" width="240" height="112" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- chamfer nos cantos (indica octógono) - triângulos brancos-transparentes pra sugerir -->
    <polygon points="-120,-128 -120,-16 -136,-16 -136,-112 -120,-128" fill="#e8e8e8" stroke="#888" stroke-width="0.3"/>
    <polygon points="120,-128 120,-16 136,-16 136,-112 120,-128" fill="#e8e8e8" stroke="#888" stroke-width="0.3"/>

    <!-- pilares vermelhos verticais nos 2 cantos da face frontal -->
    <rect x="-120" y="-128" width="16" height="112" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>
    <rect x="104" y="-128" width="16" height="112" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>

    <!-- 2 PORTAS EM ARCO (cada uma 2 blocos larg × 4 alt, moldura vermelha, arco pontudo) -->
    <!-- porta esquerda: X=-72 a -40 (32px = 2 blocos), Y=-16 a -80 -->
    <g id="porta-esq">
      <rect x="-72" y="-80" width="32" height="64" fill="#3d2818"/>  <!-- vão escuro -->
      <!-- moldura vermelha lateral -->
      <rect x="-88" y="-80" width="16" height="64" fill="#c4433c"/>
      <rect x="-40" y="-80" width="16" height="64" fill="#c4433c"/>
      <!-- topo horizontal -->
      <rect x="-72" y="-96" width="32" height="16" fill="#c4433c"/>
      <!-- ponta triangular do arco -->
      <polygon points="-72,-96 -40,-96 -56,-112" fill="#c4433c"/>
      <!-- soco vermelho embaixo -->
      <rect x="-88" y="-16" width="64" height="4" fill="#c4433c"/>
      <!-- luz interior (glow amarelo) -->
      <rect x="-64" y="-40" width="16" height="24" fill="#f4d76e" opacity="0.6"/>
    </g>
    <g id="porta-dir">
      <rect x="40" y="-80" width="32" height="64" fill="#3d2818"/>
      <rect x="24" y="-80" width="16" height="64" fill="#c4433c"/>
      <rect x="72" y="-80" width="16" height="64" fill="#c4433c"/>
      <rect x="40" y="-96" width="32" height="16" fill="#c4433c"/>
      <polygon points="40,-96 72,-96 56,-112" fill="#c4433c"/>
      <rect x="24" y="-16" width="64" height="4" fill="#c4433c"/>
      <rect x="48" y="-40" width="16" height="24" fill="#f4d76e" opacity="0.6"/>
    </g>
    <!-- pilar central entre as portas -->
    <rect x="-8" y="-128" width="16" height="112" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- moldura vermelha no meio (medalhão pequeno no pilar central) -->
    <rect x="-4" y="-72" width="8" height="16" fill="#c4433c"/>

    <text x="-155" y="-70" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5a4a8a">base octog 15×7</text>
    <text x="-155" y="-56" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5a4a8a">2 portas em arco</text>

    <!-- === TELHADO-SAIA verde escalonado com PONTAS BRANCAS NAS QUINAS === Y=7 a Y=12 -->
    <!-- degrau 1: 15 larg -->
    <rect x="-120" y="-144" width="240" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <!-- ponta branca nas quinas do degrau 1 -->
    <rect x="-120" y="-144" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>
    <rect x="104" y="-144" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>

    <!-- degrau 2: 13 larg -->
    <rect x="-104" y="-160" width="208" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-104" y="-160" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>
    <rect x="88" y="-160" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>

    <!-- degrau 3: 11 larg -->
    <rect x="-88" y="-176" width="176" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-88" y="-176" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>
    <rect x="72" y="-176" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>

    <!-- degrau 4: 9 larg -->
    <rect x="-72" y="-192" width="144" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <rect x="-72" y="-192" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>
    <rect x="56" y="-192" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.3"/>

    <!-- COLAR BRANCO (anel da base do eixo) - 7 larg -->
    <rect x="-56" y="-208" width="112" height="16" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>

    <text x="145" y="-176" font-family="sans-serif" font-size="10" fill="#5a4a8a">saia 5 degraus 15→13→11→9→7</text>
    <text x="145" y="-164" font-family="sans-serif" font-size="10" fill="#5a4a8a">com pontas brancas nas quinas</text>

    <!-- === EIXO OCTOGONAL === Y=13 a Y=35 (7 blocos largura frontal, 4 andares × 6 blocos + separadores) -->
    <!-- Cada andar: 5 blocos parede + 1 anel vermelho topo = 6 blocos -->

    <!-- ANDAR 1 (Y=13-17) -->
    <rect x="-56" y="-304" width="112" height="80" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- anel vermelho topo (2 blocos altura) -->
    <rect x="-56" y="-320" width="112" height="16" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>
    <!-- medalhão andar 1: CRUZ 3x3 -->
    <g transform="translate(0, -264)">
      <rect x="-8" y="-24" width="16" height="16" fill="#c4433c"/>
      <rect x="-24" y="-8" width="16" height="16" fill="#c4433c"/>
      <rect x="8" y="-8" width="16" height="16" fill="#c4433c"/>
      <rect x="-8" y="8" width="16" height="16" fill="#c4433c"/>
      <rect x="-8" y="-8" width="16" height="16" fill="#9ab9f6"/>  <!-- centro azul cristal -->
    </g>

    <!-- ANDAR 2 (Y=19-23) -->
    <rect x="-56" y="-400" width="112" height="80" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <rect x="-56" y="-416" width="112" height="16" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>
    <!-- medalhão andar 2: QUADRADO 3x3 sólido -->
    <g transform="translate(0, -360)">
      <rect x="-24" y="-24" width="48" height="48" fill="#c4433c"/>
      <rect x="-8" y="-8" width="16" height="16" fill="#9ab9f6"/>
    </g>

    <!-- ANDAR 3 (Y=25-29) - de novo CRUZ -->
    <rect x="-56" y="-496" width="112" height="80" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <rect x="-56" y="-512" width="112" height="16" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>
    <g transform="translate(0, -456)">
      <rect x="-8" y="-24" width="16" height="16" fill="#c4433c"/>
      <rect x="-24" y="-8" width="16" height="16" fill="#c4433c"/>
      <rect x="8" y="-8" width="16" height="16" fill="#c4433c"/>
      <rect x="-8" y="8" width="16" height="16" fill="#c4433c"/>
      <rect x="-8" y="-8" width="16" height="16" fill="#9ab9f6"/>
    </g>

    <!-- ANDAR 4 (Y=31-35) - quadrado -->
    <rect x="-56" y="-592" width="112" height="80" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <rect x="-56" y="-608" width="112" height="16" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>
    <g transform="translate(0, -552)">
      <rect x="-24" y="-24" width="48" height="48" fill="#c4433c"/>
      <rect x="-8" y="-8" width="16" height="16" fill="#9ab9f6"/>
    </g>

    <text x="145" y="-560" font-family="sans-serif" font-size="10" fill="#5a4a8a">eixo octog 7×24</text>
    <text x="145" y="-548" font-family="sans-serif" font-size="10" fill="#5a4a8a">4 andares alternam</text>
    <text x="145" y="-536" font-family="sans-serif" font-size="10" fill="#5a4a8a">cruz/quadrado</text>

    <!-- === TELHADO CÔNICO 6 CAMADAS === Y=36 a Y=41 -->
    <!-- eave 9 larg -->
    <rect x="-72" y="-624" width="144" height="16" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- pontas brancas nas quinas do eave -->
    <rect x="-72" y="-624" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.6"/>
    <rect x="56" y="-624" width="16" height="16" fill="#fcfcfc" stroke="#888" stroke-width="0.6"/>

    <!-- camada 1: 9 larg -->
    <rect x="-72" y="-640" width="144" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <!-- camada 2: 7 larg -->
    <rect x="-56" y="-656" width="112" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <!-- camada 3: 5 larg -->
    <rect x="-40" y="-672" width="80" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <!-- camada 4: 3 larg -->
    <rect x="-24" y="-688" width="48" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <!-- camada 5: 1 larg -->
    <rect x="-8" y="-704" width="16" height="16" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>

    <text x="145" y="-660" font-family="sans-serif" font-size="10" fill="#5a4a8a">telhado cônico</text>
    <text x="145" y="-648" font-family="sans-serif" font-size="10" fill="#5a4a8a">6 camadas 9→1</text>

    <!-- === PINÁCULO COMPLEXO === Y=42 a Y=47 -->
    <!-- base branca 1x1 -->
    <rect x="-8" y="-720" width="16" height="16" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <!-- esfera vermelha 3x2 achatada -->
    <ellipse cx="0" cy="-732" rx="20" ry="12" fill="#c4433c" stroke="#5a1a17" stroke-width="0.5"/>
    <!-- 2 chifres brancos em V invertido (curvos, saindo dos lados da esfera) -->
    <path d="M -20 -732 Q -32 -748 -36 -772" stroke="#fcfcfc" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 20 -732 Q 32 -748 36 -772" stroke="#fcfcfc" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- pontinhas vermelhas nos chifres -->
    <circle cx="-36" cy="-772" r="3" fill="#c4433c"/>
    <circle cx="36" cy="-772" r="3" fill="#c4433c"/>
    <!-- haste central branca -->
    <rect x="-2" y="-756" width="4" height="20" fill="#fcfcfc"/>
    <!-- pequena esfera vermelha topo -->
    <circle cx="0" cy="-760" r="4" fill="#c4433c"/>
    <!-- ponta final -->
    <line x1="0" y1="-762" x2="0" y2="-780" stroke="#888" stroke-width="1"/>

    <text x="145" y="-740" font-family="sans-serif" font-size="10" fill="#5a4a8a">pináculo complexo</text>
    <text x="145" y="-728" font-family="sans-serif" font-size="10" fill="#5a4a8a">esfera + chifres em V</text>
    <text x="145" y="-716" font-family="sans-serif" font-size="10" fill="#5a4a8a">+ haste + esfera topo</text>

    <!-- Escalas Y -->
    <g font-family="sans-serif" font-size="8" fill="#666">
      <line x1="-260" y1="0" x2="-260" y2="-800" stroke="#888" stroke-width="0.5"/>
      <line x1="-263" y1="0" x2="-257" y2="0" stroke="#888" stroke-width="1"/>
      <text x="-266" y="4" text-anchor="end">Y=0</text>
      <line x1="-263" y1="-80" x2="-257" y2="-80" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-76" text-anchor="end">Y=5</text>
      <line x1="-263" y1="-160" x2="-257" y2="-160" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-156" text-anchor="end">Y=10</text>
      <line x1="-263" y1="-240" x2="-257" y2="-240" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-236" text-anchor="end">Y=15</text>
      <line x1="-263" y1="-320" x2="-257" y2="-320" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-316" text-anchor="end">Y=20</text>
      <line x1="-263" y1="-400" x2="-257" y2="-400" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-396" text-anchor="end">Y=25</text>
      <line x1="-263" y1="-480" x2="-257" y2="-480" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-476" text-anchor="end">Y=30</text>
      <line x1="-263" y1="-560" x2="-257" y2="-560" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-556" text-anchor="end">Y=35</text>
      <line x1="-263" y1="-640" x2="-257" y2="-640" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-636" text-anchor="end">Y=40</text>
      <line x1="-263" y1="-720" x2="-257" y2="-720" stroke="#888" stroke-width="1"/>
      <text x="-266" y="-716" text-anchor="end">Y=45</text>
    </g>

  </g>

  <!-- LEGENDA seções -->
  <g transform="translate(20, 900)">
    <rect x="0" y="0" width="280" height="170" fill="#ffffff" opacity="0.92" stroke="#5a4a8a" stroke-width="1" rx="6"/>
    <text x="10" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2a1f5c">SEÇÕES DETALHADAS</text>
    <text x="10" y="38" font-family="sans-serif" font-size="10" fill="#2a1f5c">🔹 <tspan font-weight="bold">plinth</tspan>: soco 17 blocos larg × 1 alt</text>
    <text x="10" y="52" font-family="sans-serif" font-size="10" fill="#2a1f5c">🔹 <tspan font-weight="bold">base octogonal</tspan>: 15×7, 2 portas arco</text>
    <text x="10" y="66" font-family="sans-serif" font-size="10" fill="#2a1f5c">🔹 <tspan font-weight="bold">telhado-saia</tspan>: 5 degraus 15→7 c/ pontas</text>
    <text x="10" y="80" font-family="sans-serif" font-size="10" fill="#2a1f5c">🔹 <tspan font-weight="bold">colar</tspan>: anel branco base do eixo</text>
    <text x="10" y="94" font-family="sans-serif" font-size="10" fill="#2a1f5c">🔹 <tspan font-weight="bold">eixo octogonal</tspan>: 7×24, 4 andares</text>
    <text x="10" y="108" font-family="sans-serif" font-size="10" fill="#2a1f5c">   ↳ medalhões alternam CRUZ/QUADRADO</text>
    <text x="10" y="122" font-family="sans-serif" font-size="10" fill="#2a1f5c">🔹 <tspan font-weight="bold">telhado cônico</tspan>: 6 camadas 9→1</text>
    <text x="10" y="136" font-family="sans-serif" font-size="10" fill="#2a1f5c">🔹 <tspan font-weight="bold">pináculo</tspan>: esfera+chifres V+haste+ponta</text>
    <text x="10" y="156" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a1f5c">ALTURA TOTAL ≈ 47 blocos</text>
  </g>

  <!-- LEGENDA cores -->
  <g transform="translate(620, 900)">
    <rect x="0" y="0" width="260" height="170" fill="#ffffff" opacity="0.92" stroke="#5a4a8a" stroke-width="1" rx="6"/>
    <text x="10" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2a1f5c">PALETA</text>
    <rect x="10" y="30" width="20" height="14" fill="#fcfcfc" stroke="#888"/><text x="38" y="42" font-family="sans-serif" font-size="10" fill="#2a1f5c">branco: paredes/colar/pontas</text>
    <rect x="10" y="50" width="20" height="14" fill="#c4433c"/><text x="38" y="62" font-family="sans-serif" font-size="10" fill="#2a1f5c">vermelho: pilares/anéis/portas/medalhão</text>
    <rect x="10" y="70" width="20" height="14" fill="#415920"/><text x="38" y="82" font-family="sans-serif" font-size="10" fill="#2a1f5c">verde: telhados</text>
    <rect x="10" y="90" width="20" height="14" fill="#9ab9f6"/><text x="38" y="102" font-family="sans-serif" font-size="10" fill="#2a1f5c">azul cristal: centro medalhão</text>
    <rect x="10" y="110" width="20" height="14" fill="#f4d76e"/><text x="38" y="122" font-family="sans-serif" font-size="10" fill="#2a1f5c">amarelo: glow interno das portas</text>
    <text x="10" y="145" font-family="sans-serif" font-size="10" fill="#8a5a20" font-weight="bold">novidades vs v1:</text>
    <text x="10" y="160" font-family="sans-serif" font-size="9" fill="#5a4a8a">chamfer octogonal, 2 portas, plinth, pilares</text>
  </g>
</svg>
