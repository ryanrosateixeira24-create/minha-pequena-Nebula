<?xml version="1.0" encoding="UTF-8"?>
<!--
  TORRE Check-In Station — vista ISOMÉTRICA v2 (HEXÁGONO correto)
  Baseado em Meshy v2 + confirmação hexagonal
  Mostra 3 faces visíveis (frente + 2 chamfers)
  Escala: 1 bloco = 18px de aresta
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1000" width="900" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4dcf0"/>
      <stop offset="1" stop-color="#f4d76e" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff4a6"/>
      <stop offset="0.6" stop-color="#f4b942" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f4b942" stop-opacity="0"/>
    </radialGradient>
    <!-- gradientes de sombra por face -->
    <linearGradient id="face-frontal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="face-chamfer-esq" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8d8d8"/>
      <stop offset="1" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="face-chamfer-dir" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8e8e8"/>
      <stop offset="1" stop-color="#d8d8d8"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1000" fill="url(#bg)"/>

  <text x="450" y="25" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#2a1f5c">TORRE 3D — HEXAGONAL (vista isométrica v2)</text>
  <text x="450" y="42" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a4a8a">3 faces visíveis: frente + chamfer esq + chamfer dir • 38 blocos altura</text>

  <!--
    Sistema hexagonal isométrico:
    Face frontal (norte): direto pra câmera
    Chamfer esquerdo (NW→N): 60° pra esquerda
    Chamfer direito (NE→E): 60° pra direita
    
    Pra cada seção horizontal:
    - centro X visual = 450
    - face frontal: retângulo largura W_frontal × altura H
    - chamfer esq: paralelogramo largura W_chamfer × altura H, inclinado
    - chamfer dir: idem espelhado
    
    Larguras aproximadas por seção (px, 18px por bloco):
  -->

  <g transform="translate(450, 950)">
    <!-- === CHÃO DE GRAMA hexagonal === -->
    <polygon points="0,20 -180,80 -180,180 0,240 180,180 180,80" fill="#7aba5a" stroke="#4a8a3a" stroke-width="1"/>

    <!-- ================================================================
         PLINTH Y=0-1 (14 blocos frente, 2 alt)
         face frontal 14×2 = 252×36
         chamfers com metade = 126 largura oblíqua
    ================================================================ -->
    <!-- face frontal PLINTH -->
    <polygon points="-126,-36 126,-36 126,0 -126,0" fill="url(#face-frontal)" stroke="#666" stroke-width="0.5"/>
    <!-- chamfer esquerdo -->
    <polygon points="-126,-36 -216,10 -216,46 -126,0" fill="url(#face-chamfer-esq)" stroke="#666" stroke-width="0.5"/>
    <!-- chamfer direito -->
    <polygon points="126,-36 216,10 216,46 126,0" fill="url(#face-chamfer-dir)" stroke="#666" stroke-width="0.5"/>
    <!-- borda vermelha topo do plinth -->
    <polygon points="-126,-36 126,-36 126,-32 -126,-32" fill="#c4433c"/>
    <polygon points="-126,-36 -216,10 -216,14 -126,-32" fill="#a83c34"/>
    <polygon points="126,-36 216,10 216,14 126,-32" fill="#a83c34"/>

    <!-- ================================================================
         BASE HEXAGONAL Y=3-7 (12 frente, 5 alt) - PORTA + PILARES
    ================================================================ -->
    <!-- face frontal -->
    <polygon points="-108,-126 108,-126 108,-36 -108,-36" fill="url(#face-frontal)" stroke="#666" stroke-width="0.5"/>
    <!-- pilar R vermelho externo esq -->
    <polygon points="-108,-126 -90,-126 -90,-36 -108,-36" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
    <!-- pilar R vermelho externo dir -->
    <polygon points="90,-126 108,-126 108,-36 90,-36" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
    <!-- 2 pilaretes internos peristilo (face frontal) -->
    <polygon points="-54,-108 -45,-108 -45,-45 -54,-45" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>
    <polygon points="45,-108 54,-108 54,-45 45,-45" fill="#c4433c" stroke="#5a1a17" stroke-width="0.3"/>

    <!-- PORTA CENTRAL c/ arco escalonado + luz -->
    <rect x="-27" y="-99" width="54" height="63" fill="#3d2818"/>
    <rect x="-45" y="-99" width="18" height="63" fill="#c4433c"/>
    <rect x="27" y="-99" width="18" height="63" fill="#c4433c"/>
    <rect x="-27" y="-117" width="54" height="18" fill="#c4433c"/>
    <polygon points="-27,-117 27,-117 18,-135 -18,-135" fill="#c4433c"/>
    <polygon points="-18,-135 18,-135 9,-153 -9,-153" fill="#c4433c"/>
    <!-- luz dentro -->
    <ellipse cx="0" cy="-75" rx="16" ry="20" fill="url(#glow)"/>
    <rect x="-7" y="-82" width="14" height="18" fill="#fff4a6"/>
    <rect x="-3" y="-65" width="6" height="6" fill="#c4433c"/>

    <!-- chamfer esq da base -->
    <polygon points="-108,-126 -198,-80 -198,10 -108,-36" fill="url(#face-chamfer-esq)" stroke="#666" stroke-width="0.5"/>
    <!-- pilar R no ponto extremo do chamfer esq -->
    <polygon points="-198,-80 -180,-89 -180,1 -198,10" fill="#a83c34" stroke="#5a1a17" stroke-width="0.4"/>
    <!-- pilarete interno chamfer esq -->
    <polygon points="-153,-103 -144,-108 -144,-45 -153,-40" fill="#a83c34"/>

    <!-- chamfer dir da base -->
    <polygon points="108,-126 198,-80 198,10 108,-36" fill="url(#face-chamfer-dir)" stroke="#666" stroke-width="0.5"/>
    <polygon points="180,-89 198,-80 198,10 180,1" fill="#a83c34" stroke="#5a1a17" stroke-width="0.4"/>
    <polygon points="144,-108 153,-103 153,-40 144,-45" fill="#a83c34"/>

    <!-- ================================================================
         COLAR Y=8 (11 larg, 1 alt) — moldura vermelha antes da saia
    ================================================================ -->
    <polygon points="-99,-144 99,-144 99,-126 -99,-126" fill="#c4433c"/>
    <polygon points="-99,-144 -189,-98 -189,-80 -99,-126" fill="#a83c34"/>
    <polygon points="99,-144 189,-98 189,-80 99,-126" fill="#a83c34"/>

    <!-- ================================================================
         SAIA Y=9-12 (4 degraus 15→13→11→9)
    ================================================================ -->
    <!-- degrau 1 (15) - MAIS LARGO -->
    <polygon points="-135,-162 135,-162 135,-144 -135,-144" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-135,-162 -225,-116 -225,-98 -135,-144" fill="#2f4218" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="135,-162 225,-116 225,-98 135,-144" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3"/>
    <!-- pontas brancas quinas -->
    <polygon points="-135,-162 -117,-162 -117,-144 -135,-144" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <polygon points="117,-162 135,-162 135,-144 117,-144" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>

    <!-- degrau 2 (13) -->
    <polygon points="-117,-180 117,-180 117,-162 -117,-162" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-117,-180 -207,-134 -207,-116 -117,-162" fill="#2f4218" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="117,-180 207,-134 207,-116 117,-162" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-117,-180 -99,-180 -99,-162 -117,-162" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>
    <polygon points="99,-180 117,-180 117,-162 99,-162" fill="#fcfcfc" stroke="#666" stroke-width="0.3"/>

    <!-- degrau 3 (11) -->
    <polygon points="-99,-198 99,-198 99,-180 -99,-180" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-99,-198 -189,-152 -189,-134 -99,-180" fill="#2f4218" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="99,-198 189,-152 189,-134 99,-180" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3"/>

    <!-- degrau 4 (9) -->
    <polygon points="-81,-216 81,-216 81,-198 -81,-198" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-81,-216 -171,-170 -171,-152 -81,-198" fill="#2f4218" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="81,-216 171,-170 171,-152 81,-198" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3"/>

    <!-- ================================================================
         COLAR BRANCO Y=13-14 (9 larg, 2 alt)
    ================================================================ -->
    <polygon points="-81,-252 81,-252 81,-216 -81,-216" fill="url(#face-frontal)" stroke="#666" stroke-width="0.4"/>
    <polygon points="-81,-252 -171,-206 -171,-170 -81,-216" fill="url(#face-chamfer-esq)" stroke="#666" stroke-width="0.4"/>
    <polygon points="81,-252 171,-206 171,-170 81,-216" fill="url(#face-chamfer-dir)" stroke="#666" stroke-width="0.4"/>

    <!-- ================================================================
         EIXO HEXAGONAL Y=15-27 (7 larg, 4 andares × 3 blocos)
    ================================================================ -->
    <!-- Andar 1 (3 blocos) -->
    <g id="andar-1">
      <!-- face frontal -->
      <polygon points="-63,-306 63,-306 63,-252 -63,-252" fill="url(#face-frontal)" stroke="#666" stroke-width="0.4"/>
      <!-- medalhão 2x2 vermelho c/ centro amarelo -->
      <rect x="-18" y="-297" width="36" height="27" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
      <rect x="-9" y="-288" width="18" height="9" fill="#f4b942"/>
      <!-- anel R no topo do andar -->
      <polygon points="-63,-306 63,-306 63,-297 -63,-297" fill="#c4433c"/>

      <!-- chamfer esq -->
      <polygon points="-63,-306 -153,-260 -153,-206 -63,-252" fill="url(#face-chamfer-esq)" stroke="#666" stroke-width="0.4"/>
      <polygon points="-63,-306 -153,-260 -153,-251 -63,-297" fill="#a83c34"/>
      <!-- medalhão no chamfer esq -->
      <polygon points="-108,-283 -99,-287 -99,-260 -108,-256" fill="#c4433c"/>

      <!-- chamfer dir -->
      <polygon points="63,-306 153,-260 153,-206 63,-252" fill="url(#face-chamfer-dir)" stroke="#666" stroke-width="0.4"/>
      <polygon points="63,-306 153,-260 153,-251 63,-297" fill="#a83c34"/>
      <polygon points="99,-287 108,-283 108,-256 99,-260" fill="#c4433c"/>
    </g>

    <!-- Andar 2 -->
    <g id="andar-2" transform="translate(0, -54)">
      <polygon points="-63,-306 63,-306 63,-252 -63,-252" fill="url(#face-frontal)" stroke="#666" stroke-width="0.4"/>
      <rect x="-18" y="-297" width="36" height="27" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
      <rect x="-9" y="-288" width="18" height="9" fill="#f4b942"/>
      <polygon points="-63,-306 63,-306 63,-297 -63,-297" fill="#c4433c"/>
      <polygon points="-63,-306 -153,-260 -153,-206 -63,-252" fill="url(#face-chamfer-esq)" stroke="#666" stroke-width="0.4"/>
      <polygon points="-63,-306 -153,-260 -153,-251 -63,-297" fill="#a83c34"/>
      <polygon points="-108,-283 -99,-287 -99,-260 -108,-256" fill="#c4433c"/>
      <polygon points="63,-306 153,-260 153,-206 63,-252" fill="url(#face-chamfer-dir)" stroke="#666" stroke-width="0.4"/>
      <polygon points="63,-306 153,-260 153,-251 63,-297" fill="#a83c34"/>
      <polygon points="99,-287 108,-283 108,-256 99,-260" fill="#c4433c"/>
    </g>

    <!-- Andar 3 -->
    <g id="andar-3" transform="translate(0, -108)">
      <polygon points="-63,-306 63,-306 63,-252 -63,-252" fill="url(#face-frontal)" stroke="#666" stroke-width="0.4"/>
      <rect x="-18" y="-297" width="36" height="27" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
      <rect x="-9" y="-288" width="18" height="9" fill="#f4b942"/>
      <polygon points="-63,-306 63,-306 63,-297 -63,-297" fill="#c4433c"/>
      <polygon points="-63,-306 -153,-260 -153,-206 -63,-252" fill="url(#face-chamfer-esq)" stroke="#666" stroke-width="0.4"/>
      <polygon points="-63,-306 -153,-260 -153,-251 -63,-297" fill="#a83c34"/>
      <polygon points="-108,-283 -99,-287 -99,-260 -108,-256" fill="#c4433c"/>
      <polygon points="63,-306 153,-260 153,-206 63,-252" fill="url(#face-chamfer-dir)" stroke="#666" stroke-width="0.4"/>
      <polygon points="63,-306 153,-260 153,-251 63,-297" fill="#a83c34"/>
      <polygon points="99,-287 108,-283 108,-256 99,-260" fill="#c4433c"/>
    </g>

    <!-- Andar 4 -->
    <g id="andar-4" transform="translate(0, -162)">
      <polygon points="-63,-306 63,-306 63,-252 -63,-252" fill="url(#face-frontal)" stroke="#666" stroke-width="0.4"/>
      <rect x="-18" y="-297" width="36" height="27" fill="#c4433c" stroke="#5a1a17" stroke-width="0.4"/>
      <rect x="-9" y="-288" width="18" height="9" fill="#f4b942"/>
      <polygon points="-63,-306 -153,-260 -153,-206 -63,-252" fill="url(#face-chamfer-esq)" stroke="#666" stroke-width="0.4"/>
      <polygon points="-108,-283 -99,-287 -99,-260 -108,-256" fill="#c4433c"/>
      <polygon points="63,-306 153,-260 153,-206 63,-252" fill="url(#face-chamfer-dir)" stroke="#666" stroke-width="0.4"/>
      <polygon points="99,-287 108,-283 108,-256 99,-260" fill="#c4433c"/>
    </g>

    <!-- ================================================================
         BEIRAL TOPO Y=28-30 (9 larg projetado, 3 alt)
    ================================================================ -->
    <polygon points="-81,-522 81,-522 81,-468 -81,-468" fill="url(#face-frontal)" stroke="#666" stroke-width="0.4"/>
    <polygon points="-81,-522 -171,-476 -171,-422 -81,-468" fill="url(#face-chamfer-esq)" stroke="#666" stroke-width="0.4"/>
    <polygon points="81,-522 171,-476 171,-422 81,-468" fill="url(#face-chamfer-dir)" stroke="#666" stroke-width="0.4"/>

    <!-- ================================================================
         TELHADO CÔNICO Y=31-34 (4 camadas 9→7→5→3)
    ================================================================ -->
    <!-- camada 1 -->
    <polygon points="-81,-540 81,-540 81,-522 -81,-522" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-81,-540 -171,-494 -171,-476 -81,-522" fill="#2f4218" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="81,-540 171,-494 171,-476 81,-522" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3"/>
    <!-- topo visível (losango) -->
    <polygon points="-81,-540 -171,-494 0,-405 81,-540" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3" opacity="0"/>

    <!-- camada 2 -->
    <polygon points="-63,-558 63,-558 63,-540 -63,-540" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-63,-558 -153,-512 -153,-494 -63,-540" fill="#2f4218" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="63,-558 153,-512 153,-494 63,-540" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3"/>

    <!-- camada 3 -->
    <polygon points="-45,-576 45,-576 45,-558 -45,-558" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-45,-576 -135,-530 -135,-512 -45,-558" fill="#2f4218" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="45,-576 135,-530 135,-512 45,-558" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3"/>

    <!-- camada 4 -->
    <polygon points="-27,-594 27,-594 27,-576 -27,-576" fill="#415920" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="-27,-594 -117,-548 -117,-530 -27,-576" fill="#2f4218" stroke="#1a2408" stroke-width="0.3"/>
    <polygon points="27,-594 117,-548 117,-530 27,-576" fill="#5a7a2c" stroke="#1a2408" stroke-width="0.3"/>

    <!-- ================================================================
         PINÁCULO Y=35-37
    ================================================================ -->
    <!-- base branca -->
    <polygon points="-27,-612 27,-612 27,-594 -27,-594" fill="url(#face-frontal)" stroke="#666" stroke-width="0.3"/>
    <polygon points="-27,-612 -117,-566 -117,-548 -27,-594" fill="url(#face-chamfer-esq)"/>
    <polygon points="27,-612 117,-566 117,-548 27,-594" fill="url(#face-chamfer-dir)"/>
    <!-- esferinha R -->
    <polygon points="-9,-630 9,-630 9,-612 -9,-612" fill="#c4433c"/>
    <polygon points="-9,-630 -99,-584 -99,-566 -9,-612" fill="#a83c34"/>
    <polygon points="9,-630 99,-584 99,-566 9,-612" fill="#a83c34"/>
    <!-- bloco branco topo -->
    <polygon points="-9,-648 9,-648 9,-630 -9,-630" fill="url(#face-frontal)"/>
    <polygon points="-9,-648 -99,-602 -99,-584 -9,-630" fill="url(#face-chamfer-esq)"/>
    <polygon points="9,-648 99,-602 99,-584 9,-630" fill="url(#face-chamfer-dir)"/>
    <!-- antena -->
    <line x1="0" y1="-648" x2="0" y2="-700" stroke="#888" stroke-width="2"/>
    <line x1="-54" y1="-625" x2="-54" y2="-677" stroke="#666" stroke-width="1" opacity="0.4"/>
    <line x1="54" y1="-625" x2="54" y2="-677" stroke="#666" stroke-width="1" opacity="0.4"/>

  </g>

  <!-- indicadores -->
  <g transform="translate(770, 900)" font-family="sans-serif" font-size="9" fill="#5a4a8a">
    <text x="0" y="0" font-weight="bold">3 FACES VISÍVEIS</text>
    <rect x="0" y="10" width="15" height="15" fill="url(#face-frontal)" stroke="#666"/>
    <text x="20" y="22">frontal (norte)</text>
    <rect x="0" y="30" width="15" height="15" fill="url(#face-chamfer-esq)" stroke="#666"/>
    <text x="20" y="42">chamfer NW</text>
    <rect x="0" y="50" width="15" height="15" fill="url(#face-chamfer-dir)" stroke="#666"/>
    <text x="20" y="62">chamfer NE</text>
  </g>

  <g transform="translate(20, 890)">
    <rect x="0" y="0" width="260" height="90" fill="#ffffff" opacity="0.92" stroke="#5a4a8a" stroke-width="1" rx="6"/>
    <text x="10" y="18" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2a1f5c">TORRE HEXAGONAL 3D</text>
    <text x="10" y="34" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ 6 pilares R nas quinas do hexágono</text>
    <text x="10" y="46" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ 3 faces visíveis (frente+2 chamfers)</text>
    <text x="10" y="58" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ medalhões em CADA face do eixo</text>
    <text x="10" y="70" font-family="sans-serif" font-size="9" fill="#2a1f5c">✓ 4 andares de 3 blocos</text>
    <text x="10" y="84" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2a1f5c">38 alt × 14 base</text>
  </g>
</svg>
